# Optional host-level Nginx proxy for Gatus.
# Default production mode is SSH tunnel only. Use this only when web access is intentional.

limit_req_zone $binary_remote_addr zone=gatus_per_ip:10m rate=30r/m;
limit_req_status 429;

server {
    listen 443 ssl;
    http2 on;
    server_name status.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    access_log /var/log/nginx/gatus-access.log combined;
    error_log  /var/log/nginx/gatus-error.log warn;

    auth_basic "Monitoring";
    auth_basic_user_file /etc/nginx/.htpasswd_monitoring;

    location / {
        limit_req zone=gatus_per_ip burst=10 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
