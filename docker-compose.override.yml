# Applied automatically by Docker Compose in development.
# Never used in production deploys.
services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "127.0.0.1:6379:6379"

  backend:
    tty: true
    environment:
      FORCE_COLOR: "1"
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic

  frontend:
    # The nested node_modules volume starts empty when /app is bind-mounted.
    # Bootstrap it as root, then run the dev server as the unprivileged node user.
    user: root
    ports:
      - "3000:3000"
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command:
      - sh
      - -lc
      - |
        if [ "$(stat -c %u /app/node_modules)" != "$(id -u node)" ]; then
          chown -R node:node /app/node_modules
        fi
        chown node:node /home/node
        su node -s /bin/sh -c 'CI=true pnpm install --frozen-lockfile && pnpm dev'

  nginx:
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.dev.conf:ro
    command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx.dev.conf"]
