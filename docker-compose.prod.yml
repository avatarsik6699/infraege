# Production overrides — apply on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# IMPORTANT: docker-compose.override.yml must NOT be present on the server.
# Delete it after cloning: rm docker-compose.override.yml
#
# First-time SSL issuance (run BEFORE starting the full stack):
#   docker run --rm -p 80:80 \
#     -v /etc/letsencrypt:/etc/letsencrypt \
#     certbot/certbot certonly --standalone \
#     -d your-domain.com -d www.your-domain.com \
#     --email admin@your-domain.com --agree-tos --no-eff-email
#
# SSL renewal (add to VPS cron):
#   0 */12 * * * cd /opt/your-project && ./scripts/renew-certs.sh

services:
  backend:
    environment:
      APP_ENV: production

  frontend:
    build:
      args:
        VITE_API_BASE_URL: ${API_BASE_URL:?API_BASE_URL is required for production frontend builds}
    environment:
      APP_ENV: production

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    command: ["nginx", "-g", "daemon off;"]

  certbot:
    image: certbot/certbot:latest
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot

volumes:
  certbot-www:
