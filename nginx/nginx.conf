# Production nginx config — replace [DOMAIN] with your actual domain before deploying.
# Used by docker-compose.prod.yml.

events {
    worker_connections 1024;
}

http {
    error_log /var/log/nginx/error.log warn;
    error_log /dev/stderr warn;

    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'request_time=$request_time '
                        'request_id=$request_id';

    access_log /var/log/nginx/access.log security;
    access_log /dev/stdout security;

    limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_per_ip:10m rate=5r/m;
    limit_req_status 429;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:3000;
    }

    # HTTP — ACME challenge pass-through + redirect to HTTPS
    server {
        listen 80;
        server_name [DOMAIN] www.[DOMAIN];

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        http2 on;
        server_name [DOMAIN] www.[DOMAIN];

        ssl_certificate     /etc/letsencrypt/live/[DOMAIN]/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/[DOMAIN]/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "SAMEORIGIN"    always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http: https: ws: wss:" always;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
        gzip_min_length 1000;

        # Stricter rate limits for public auth endpoints.
        location = /api/v1/public/auth/login {
            limit_req zone=auth_per_ip burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 60;
        }

        location = /api/v1/public/auth/register {
            limit_req zone=auth_per_ip burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 60;
        }

        # FastAPI backend
        location /api/ {
            limit_req zone=api_per_ip burst=30 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300;
            proxy_connect_timeout 60;
        }

        # React Router static assets — aggressive caching
        location /assets/ {
            proxy_pass http://frontend;
            expires    365d;
            add_header Cache-Control "public, immutable";
        }

        # React Router SSR — everything else
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
